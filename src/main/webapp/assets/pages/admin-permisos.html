<!-- Start Admin Permisos Area -->
<section class="cart-area ptb-100">
    <div class="container">
        <div class="row">
            <div class="col-md-12">
                <div class="block-header block-header-default mb-4">
                    <h3 class="block-title">Permisos <!-- small>Subtitle</small --></h3>
                </div>
                <div class="shop-item-box">
                    <div class="row">
                        <div class="col-12 col-lg-6">
                            <div id="permisos-block">
                                <div class="block-content">
                                    <table id="table-permisos" class="table table-hover table-vcenter">
                                    </table>
                                    <hr>
                                    <div class="row mb-4">
                                        <div class="col-12">
                                            <div class="justify-content-center text-start">
                                                <div class="btn-group" role="group" aria-label="Button group with nested dropdown">
                                                    <button type="button" class="btn btn-outline-primary" id="btn-agregar-permiso"
                                                            onclick="agregaPermiso();">
                                                        <span class="bx bx-plus" aria-hidden="true"></span>
                                                    </button>
                                                    <button type="button" class="btn btn-outline-primary" id="btn-quitar-permiso"
                                                            onclick="quitaPermiso();">
                                                        <span class="bx bx-minus" aria-hidden="true"></span>
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-12 col-lg-6">
                            <div id="roles-block">
                                <div class="block-content">
                                    <table id="table-roles" class="table table-hover table-vcenter">
                                    </table>
                                    <hr>
                                    <div class="row mb-4">
                                        <div class="col-12">
                                            <div class="justify-content-center text-end">
                                                <div class="btn-group" role="group" aria-label="Button group with nested dropdown">
                                                    <button type="button" class="btn btn-outline-primary" id="btn-agregar-rol"
                                                            onclick="agregaPermisoPerfil();">
                                                        <span class="bx bx-plus" aria-hidden="true"></span>
                                                    </button>
                                                    <button type="button" class="btn btn-outline-primary" id="btn-quitar-rol"
                                                            onclick="quitaPermisoPerfil();">
                                                        <span class="bx bx-minus" aria-hidden="true"></span>
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div id="notify-div" class="block-content block-content-full block-content-sm bg-body-light fs-sm">
                    Listo.
                </div>
            </div>
        </div>
    </div>
</section>
<!-- End Admin Permisos Area -->
