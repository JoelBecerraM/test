<!-- Start Page Banner -->
<div class="page-banner-area">
    <div class="d-table">
        <div class="d-table-cell">
            <div class="container">
                <div class="page-banner-content">
                    <h2>Iniciar Sesi&oacute;n</h2>
                </div>
            </div>
        </div>
    </div>
</div>
<!-- End Page Banner -->

<!-- Start My Account Area -->
<section class="my-account-area ptb-100">
    <div class="container">
        <div class="row">
            <div class="col-lg-12 col-md-12">
                <div class="login-form mb-30">
                    <h2>Inicio de Sesi&oacute;n</h2>
                    <form id="form-login">
                        <div class="row">
                            <div class="col-12">
                                <div class="form-group">
                                    <label>Usuario:</label>
                                    <input type="text" name="usuario" id="usuario" class="form-control" required placeholder="Usuario"
                                           data-error="Por favor ingrese su usuario.">
                                    <div class="help-block with-errors mt-1 h6 text-danger"></div>
                                </div>
                            </div>                                                     
                            <div class="col-10">
                                <div class="form-group">
                                    <label>Contrase&ntilde;a:</label>
                                    <input type="password" name="password" id="password" class="form-control" required placeholder="Contrase&ntilde;a"
                                           data-error="Por favor ingrese su contraseña">
                                    <div class="help-block with-errors mt-1 h6 text-danger"></div>
                                </div>
                            </div>
                            <div class="col-2">
                                <div class="form-group">
                                    <button type="submit" class="default-btn"
                                            onclick="togglePassword('password'); return false;">
                                        <i class="bx bx-edit"></i>
                                        <span></span>
                                    </button>
                                </div>
                            </div>
                            <div class="col-12">
                                <div class="form-group">
                                    <div class="checkbox">
                                        <label>
                                            <input type="checkbox" name="recordar" id="recordar"> Recordar
                                        </label>
                                        <div class="help-block with-errors"></div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-12">
                                <button type="submit" class="default-btn">
                                    Iniciar
                                </button>
                                <div id="msgSubmit" class="h3 text-center hidden"></div>
                                <div class="clearfix"></div>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
<!-- End My Account Area -->
